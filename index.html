<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PWA Demo</title>
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <h1>PWA Demo</h1>
  <p>This app works offline 🚀</p>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
